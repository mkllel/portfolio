<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>첼시FC 팬사이트</title>
    <link rel="stylesheet" href="css/main.css" type="text/css">
    <link rel="stylesheet" href="css/bootstrap.css" type="text/css">
    <script src="js/jquery-3.5.1.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/main.js"></script>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="logo">
                <a href="index.html">
                    <img src="img/Chelsea_FC_Logo.png" alt="chelsea">
                    <h1>첼시FC 팬사이트</h1>
                </a>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="#">구단 소개</a>
                    </li>
                    <li>
                        <a href="#">선수단</a>
                    </li>
                    <li>
                        <a href="#">경기일정</a>
                    </li>
                    <li>
                        <a href="https://www.chelseafc.com/en">첼시FC 홈페이지</a>
                    </li>
                    <li>
                        <a href="#">팬게시판</a>
                    </li>
                    <li>
                        <a href="#">영상</a>
                    </li>
                </ul>
            </nav>
        </header>

        <!--스케줄표-->
        <div class="calendar">
            <div class="header">
                <div class="year-month"></div>
                <div class="nav">
                    <button class="nav-btn go-prev" onclick="prevMonth()">&lt;</button>
                    <button class="nav-btn go-today" onclick="goToday()">Today</button>
                    <button class="nav-btn go-next" onclick="nextMonth()">&gt;</button>
                </div>
            </div>
            <div class="main">
                <div class="days">
                    <div class="day">일</div>
                    <div class="day">월</div>
                    <div class="day">화</div>
                    <div class="day">수</div>
                    <div class="day">목</div>
                    <div class="day">금</div>
                    <div class="day">토</div>
                </div>
                <div class="dates"></div>
            </div>
        </div>
        <script src="js/index.js"></script>

        <footer>
            <div class="logofooter">
                <img src="img/Chelsea_FC_Logo.png" alt="logofooter">
            </div>
            <h1>
                제작 이민규
            </h1>
        </footer>
    </div>

</body></html>
